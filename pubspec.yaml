name: mindful_pulse
description: Stitch Habit Tracker - Energetic Serenity Design System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0
  provider: ^6.1.1
  uuid: ^4.3.3
  intl: ^0.19.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.2

  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  flutter_launcher_icons: ^0.13.1  # ✅ correct

# 🔥 THIS MUST BE OUTSIDE dev_dependencies
flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"  # ✅ correct path

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png   # ✅ add this